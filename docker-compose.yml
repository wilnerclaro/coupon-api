services:
  postgres:
    image: postgres:16-alpine
    container_name: coupon-postgres
    environment:
      POSTGRES_DB: coupon_db
      POSTGRES_USER: coupon_user
      POSTGRES_PASSWORD: coupon_password
    ports:
      - "5434:5432"
    volumes:
      - coupon-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coupon_user -d coupon_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  coupon-api:
    build: .
    container_name: coupon-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/coupon_db
      SPRING_DATASOURCE_USERNAME: coupon_user
      SPRING_DATASOURCE_PASSWORD: coupon_password
      SERVER_PORT: 8080
    ports:
      - "8085:8080"

volumes:
  coupon-postgres-data: